<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
        <div>
            <span>Titles per page: </span>
            <label for="count1">5</label>
            <input type="radio" name="count" id="count1" value="5" checked>
            <label for="count2">10</label>
            <input type="radio" name="count" id="count2" value="10">
            <label for="count3">15</label>
            <input type="radio" name="count" id="count3" value="15">
            <label for="count4">20</label>
            <input type="radio" name="count" id="count4" value="20">
            <label for="count5">25</label>
            <input type="radio" name="count" id="count5" value="25">
        </div>
        <div>
            <button id="btn-prev-page">Prev</button>
            <span id="current-page">1</span>
            <button id="btn-next-page">Next</button>
        </div>
    </nav>
    </header>

    <main>
        <div id="parent"></div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
